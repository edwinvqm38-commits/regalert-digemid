name: DIGEMID - Drive Migration

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecucion"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      document_key:
        description: "Document key especifico (opcional)"
        required: false
        type: string
      limit:
        description: "Limite de documentos a procesar (opcional)"
        required: false
        type: string
      pending_only:
        description: "Procesar solo alertas aun no migradas a drive_structure"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  drive-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
      GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar migracion Drive DIGEMID
        shell: bash
        run: |
          set -euo pipefail
          CMD=(python scripts/migrate_drive_digemid_structure.py --source-type alerta)

          if [[ "${{ inputs.mode }}" == "apply" ]]; then
            CMD+=(--apply)
          else
            CMD+=(--dry-run)
          fi

          if [[ -n "${{ inputs.document_key }}" ]]; then
            CMD+=(--document-key "${{ inputs.document_key }}")
          fi

          if [[ -n "${{ inputs.limit }}" ]]; then
            CMD+=(--limit "${{ inputs.limit }}")
          fi

          if [[ "${{ inputs.pending_only }}" == "true" ]]; then
            CMD+=(--pending-only)
          fi

          printf 'Ejecutando: %q ' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"

      - name: Subir reportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drive-migration-digemid
          path: |
            reports/drive_migration_dry_run.md
            reports/drive_migration_result.md
            reports/drive_migration_result.json
          if-no-files-found: error
