name: Deploy Supabase Functions

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar secrets requeridos
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Falta el secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Falta el secret SUPABASE_PROJECT_REF"
            exit 1
          fi

          echo "Secrets requeridos encontrados."

      - name: Configurar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Desplegar función telegram-bot
        run: supabase functions deploy telegram-bot --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
