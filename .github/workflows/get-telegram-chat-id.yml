name: Get Telegram Chat ID

on:
  workflow_dispatch:

jobs:
  get-chat-id:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Consultar chats recientes del bot
        run: |
          curl -sS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates" \
            | python3 -c "
          import json, sys

          data = json.load(sys.stdin)

          seen = {}
          for update in data.get('result', []):
              msg = update.get('message') or update.get('my_chat_member') or {}
              chat = msg.get('chat', {})
              chat_id = chat.get('id')
              if chat_id is None:
                  continue
              seen[chat_id] = {
                  'title': chat.get('title') or chat.get('username') or chat.get('first_name'),
                  'type': chat.get('type'),
              }

          if not seen:
              print('No hay chats recientes. Manda un mensaje cualquiera en el grupo/chat y vuelve a correr este workflow.')
          else:
              print('Chats detectados:')
              for chat_id, info in seen.items():
                  print(f\"  chat_id={chat_id} | tipo={info['type']} | nombre={info['title']}\")
          "
