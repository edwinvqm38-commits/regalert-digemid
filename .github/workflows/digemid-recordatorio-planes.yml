name: DIGEMID - Recordatorio de Planes

on:
  workflow_dispatch:

  schedule:
    # 10:00 a. m. Peru = 15:00 UTC, todos los dias
    - cron: "0 15 * * *"

concurrency:
  group: digemid-recordatorio-planes
  cancel-in-progress: false

jobs:
  recordatorio:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enviar recordatorios de planes pendientes
        run: python scripts/enviar_recordatorio_planes.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
