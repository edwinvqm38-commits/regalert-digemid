name: DIGEMID Monitor

on:
  workflow_dispatch:

  schedule:
    # Hora Perú = UTC-5
    # 09:17 a. m. Perú = 14:17 UTC
    # 01:17 p. m. Perú = 18:17 UTC
    # 06:17 p. m. Perú = 23:17 UTC
    - cron: "17 14,18,23 * * 1-5"

concurrency:
  group: digemid-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preparar credenciales Google OAuth
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/google"

          cat > "$RUNNER_TEMP/google/google_oauth_client.json" <<'EOF'
          ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          EOF

          cat > "$RUNNER_TEMP/google/google_oauth_token.json" <<'EOF'
          ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          EOF

      - name: Ejecutar pipeline completo DIGEMID
        run: |
          python scripts/run_full_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_JSON_PATH: ${{ runner.temp }}/google/google_oauth_client.json
          GOOGLE_OAUTH_TOKEN_PATH: ${{ runner.temp }}/google/google_oauth_token.json
