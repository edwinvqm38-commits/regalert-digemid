name: DIGEMID - Normativa Drive Migration

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecucion"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      document_key:
        description: "Document key normativo especifico (opcional)"
        required: false
        type: string
      limit:
        description: "Limite de normas a procesar"
        required: false
        default: "1"
        type: string
      pending_only:
        description: "Procesar solo normas pendientes sin drive_structure"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  normativa-drive-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preparar credenciales Google OAuth
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/google"

          cat > "$RUNNER_TEMP/google/google_oauth_client.json" <<'EOF'
          ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          EOF

          cat > "$RUNNER_TEMP/google/google_oauth_token.json" <<'EOF'
          ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          EOF

      - name: Ejecutar migracion Drive normativa
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_JSON_PATH: ${{ runner.temp }}/google/google_oauth_client.json
          GOOGLE_OAUTH_TOKEN_PATH: ${{ runner.temp }}/google/google_oauth_token.json
        run: |
          set -euo pipefail
          CMD=(python scripts/migrate_drive_normativa_structure.py)

          if [[ "${{ inputs.mode }}" == "apply" ]]; then
            CMD+=(--apply)
          else
            CMD+=(--dry-run)
          fi

          if [[ -n "${{ inputs.document_key }}" ]]; then
            CMD+=(--document-key "${{ inputs.document_key }}")
          fi

          if [[ -n "${{ inputs.limit }}" ]]; then
            CMD+=(--limit "${{ inputs.limit }}")
          fi

          if [[ "${{ inputs.pending_only }}" == "true" ]]; then
            CMD+=(--pending-only)
          fi

          printf 'Ejecutando: %q ' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"

      - name: Subir reportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normativa-drive-migration
          path: |
            reports/normativa_drive_migration_dry_run.md
            reports/normativa_drive_migration_result.md
            reports/normativa_drive_migration_result.json
          if-no-files-found: error
