name: DIGEMID Normativa

on:
  workflow_dispatch:

  schedule:
    # Hora Perú = UTC-5. 08:00 a. m. Perú = 13:00 UTC.
    # Corre antes que "DIGEMID - Extraer Texto Normativa" (15:30 UTC) para
    # que las normas nuevas del dia ya tengan pdf_url a tiempo para esa
    # corrida de extraccion de texto.
    - cron: "0 13 * * *"

jobs:
  normativa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
      GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pipeline normativo DIGEMID
        run: python scripts/run_normative_pipeline.py
