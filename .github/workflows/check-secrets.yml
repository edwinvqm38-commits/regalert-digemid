name: Check Secrets Presence

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Verificar presencia (nunca imprime el valor)
        run: |
          check() {
            if [ -n "${!1:-}" ]; then
              echo "$1: presente"
            else
              echo "$1: ausente"
            fi
          }
          check DEEPSEEK_API_KEY
          check GEMINI_API_KEY

      - name: Probar que GEMINI_API_KEY funciona de verdad
        run: |
          http_status=$(curl -s -o /tmp/gemini_test.json -w "%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"contents":[{"role":"user","parts":[{"text":"Responde solo: OK"}]}]}')
          echo "HTTP status: $http_status"
          cat /tmp/gemini_test.json
          if [ "$http_status" != "200" ]; then
            echo "La API key de Gemini no funciona (ver respuesta arriba)."
            exit 1
          fi
