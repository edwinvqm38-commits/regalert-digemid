name: DIGEMID - Vigia saldo DeepSeek

on:
  workflow_dispatch:

  schedule:
    # Hora Perú = UTC-5. 07:00 a. m. Perú = 12:00 UTC, antes del trafico
    # del dia de consultas de IA de los usuarios.
    - cron: "0 12 * * *"

jobs:
  check-balance:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar saldo DeepSeek
        run: python scripts/check_deepseek_balance.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
